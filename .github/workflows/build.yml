
name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install pyinstaller
        pip install requests
        
    - name: Build EXE
      run: |
        pyinstaller --onefile --noconsole --name "FacebookVotingBot" bot.py
        
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: FacebookVotingBot-EXE
        path: dist/*.exe
